<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción Mundial 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            display: flex;
            flex-direction: column;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* Header - compacto */
        .header {
            position: relative;
            z-index: 10;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, 
                #00d4ff 0%, 
                #0099ff 25%, 
                #00d4ff 50%, 
                #0099ff 75%, 
                #00d4ff 100%);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: 1.5px;
            line-height: 1;
            text-transform: uppercase;
        }

        .header-text p {
            color: #94a3b8;
            font-size: 0.7rem;
            margin-top: 1px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .header-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .badge {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .badge.gold {
            background: rgba(255, 193, 7, 0.1);
            border-color: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        /* Main container - ocupa todo el espacio restante */
        .main-container {
            flex: 1;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: #0f172a;
        }

        .iframe-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #0f172a;
            min-height: 0;
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #0f172a;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #94a3b8;
            margin-top: 12px;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* Footer - compacto */
        .footer {
            position: relative;
            z-index: 10;
            background: #0a0e1a;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .footer-credit {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .footer-credit .heart {
            color: #ff6b6b;
            font-size: 0.85rem;
        }

        .footer-credit a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer-credit a:hover {
            color: #66e5ff;
            text-decoration: underline;
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .external-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .external-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.15);
        }

        .external-btn svg {
            width: 12px;
            height: 12px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
                padding: 8px 16px;
            }

            .header-text h1 {
                font-size: 1.2rem;
            }

            .header-badges {
                width: 100%;
                justify-content: flex-start;
            }

            .footer {
                flex-direction: column;
                align-items: flex-start;
                padding: 8px 16px;
            }

            .footer-right {
                width: 100%;
                justify-content: flex-start;
            }
        }

        @media (max-width: 480px) {
            .header-text p {
                font-size: 0.6rem;
            }
            
            .badge {
                font-size: 0.5rem;
                padding: 2px 8px;
            }
            
            .logo-icon {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Background particles -->
    <div class="bg-particles" id="particles"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <div class="logo-icon">⚽</div>
                <div class="header-text">
                    <h1>Predicción de Marcadores</h1>
                    <p>Mundial FIFA 2026 — Modelos Bayesiano &amp; XGBoost</p>
                </div>
            </div>
            <div class="header-badges">
                <span class="badge">Dixon-Coles</span>
                <span class="badge">XGBoost</span>
                <span class="badge gold">Mundial 2026</span>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="main-container">
        <div class="iframe-wrapper">
            <div class="loading-overlay" id="loader">
                <div class="loader"></div>
                <div class="loading-text">Cargando modelo predictivo...</div>
            </div>
            <iframe 
                src="https://rpalafoxfalcoproject.streamlit.app/?embed=true" 
                allow="accelerometer; camera; encrypted-media; geolocation; gyroscope; microphone; clipboard-read; clipboard-write"
                allowfullscreen
                loading="lazy"
                title="Predicción Mundial 2026"
                id="appFrame"
            ></iframe>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-credit">
            <span class="heart">❤️</span>
            <span>Creado por</span>
            <a href="https://satohachi.rpalafox.com/" target="_blank">rpalafox.com</a>
        </div>
        <div class="footer-right">
            <a href="https://rpalafoxfalcoproject.streamlit.app" target="_blank" class="external-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                </svg>
                Abrir en nueva ventana
            </a>
        </div>
    </footer>

    <script>
        // Generate floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (15 + Math.random() * 20) + 's';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.width = (2 + Math.random() * 3) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        // Hide loader when iframe loads
        const iframe = document.getElementById('appFrame');
        const loader = document.getElementById('loader');
        
        iframe.addEventListener('load', () => {
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 500);
        });

        // Fallback: hide loader after 6 seconds
        setTimeout(() => {
            loader.classList.add('hidden');
        }, 6000);
    </script>

</body>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2476780591848511"
     crossorigin="anonymous"></script>
</html>
